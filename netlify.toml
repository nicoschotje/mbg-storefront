# mbg-storefront — Netlify config

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self), camera=(self), microphone=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://unpkg.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.telegram.org https://api.coingecko.com https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org; worker-src 'self' blob:; frame-ancestors 'self' https://web.telegram.org; base-uri 'self'; form-action 'self'"

# ── Internal / developer-only paths — never served on the public customer site ──
# Netlify publishes the repo root ("."), so these directories/files would otherwise
# be fetchable at mrbeaniesgreenies.com/<path>. force=true shadows the real files
# with a 404 while keeping them in git for developers. Keep these BEFORE the SPA
# catch-all below (first matching rule wins). No storefront asset lives under these
# paths — the app only references them in source comments, never fetches them.
[[redirects]]
  from   = "/docs/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/db/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/supabase/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/test/*"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/DEFECTS.md"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/STOREFRONT-AUDIT.md"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/INTEGRATION-AUDIT.md"
  to     = "/index.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/css/*"
  [headers.values]
    # Same reasoning as /js/* — revalidate every load to avoid stale CSS.
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    # Was max-age=3600 — but JS modules don't have content-hash filenames,
    # so a deploy could leave a customer with stale JS for up to 1h while
    # the new HTML expected newer exports. Result: silent ESM link failure.
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Never let the service worker itself go stale, or the cache version
# bump can't reach customers.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
