# mbg-storefront — Netlify config

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options    = "nosniff"
    X-Frame-Options           = "SAMEORIGIN"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(self), camera=(self), microphone=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://mrbeanisgreenies.com https://www.mrbeanisgreenies.com https://*.supabase.co wss://*.supabase.co https://api.telegram.org https://api.coingecko.com https://nominatim.openstreetmap.org https://*.tile.openstreetmap.org; frame-ancestors 'self' https://web.telegram.org; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/env.js"
  to = "/.netlify/functions/env"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/css/*"
  [headers.values]
    # Same reasoning as /js/* — revalidate every load to avoid stale CSS.
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    # Was max-age=3600 — but JS modules don't have content-hash filenames,
    # so a deploy could leave a customer with stale JS for up to 1h while
    # the new HTML expected newer exports. Result: silent ESM link failure.
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Never let the service worker itself go stale, or the cache version
# bump can't reach customers.
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
